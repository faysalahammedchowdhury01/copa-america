<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font Awesome -->
    <script
      src="https://kit.fontawesome.com/9438cc99d7.js"
      crossorigin="anonymous"
    ></script>
    <!-- Title -->
    <title>Conmebol Copa America 2021</title>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <!-- Main Start Here -->
    <main>
      <!-- Banner Area Start Here -->
      <section id="banner-area">
        <div class="container">
          <div class="flex">
            <!-- Banner info -->
            <div class="half-width">
              <div class="banner-info">
                <h1 class="banner-heading">Conmebol Copa America 2021</h1>
                <a class="button button-hover-white-border" href="">
                  <span class="button-text">Watch Live</span>
                  <i class="fas fa-arrow-right button-icon"></i>
                </a>
              </div>
            </div>
            <!-- Banner image -->
            <div class="half-width">
              <img class="banner-image" src="images/banner.png" alt="banner" />
            </div>
          </div>
        </div>
      </section>
      <!-- Banner Area End Here -->
    </main>
    <!-- Main End Here -->
  </body>
</html>
